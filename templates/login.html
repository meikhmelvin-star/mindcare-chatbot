<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MindCare</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=100&auto=format&fit=crop" alt="MindCare Logo" />
                🧠 MindCare
            </div>
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Sign in to your mental health support account</p>

            {% if error %}
            <div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label><i class="fa-solid fa-envelope"></i> Email Address</label>
                    <input type="email" name="email" placeholder="you@email.com" required />
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-lock"></i> Password</label>
                    <input type="password" name="password" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-right-to-bracket"></i> Sign In
                </button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="/register">Register here</a>
            </p>
        </div>
    </div>
</body>
</html>
